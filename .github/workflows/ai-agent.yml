name: ai-agent

on:
  push:
    branches: [main, master, 'feature/**']
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashpipe-dev-ai-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            dashpipe-dev-ai-agent/api/requirements.txt
            dashpipe-dev-ai-agent/dashpipe-mcp/pyproject.toml
      - name: Install dashpipe-mcp
        run: pip install -e ./dashpipe-mcp
      - name: Install API deps
        run: pip install -r api/requirements.txt
      - name: API tests
        working-directory: dashpipe-dev-ai-agent/api
        run: pytest -q
      - name: MCP platform_ops tests
        working-directory: dashpipe-dev-ai-agent/dashpipe-mcp
        run: pytest -q

  streamlit-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashpipe-dev-ai-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -e ./dashpipe-mcp
          pip install -r api/requirements.txt
          pip install -r streamlit/requirements.txt
      - name: Streamlit import smoke
        working-directory: dashpipe-dev-ai-agent/streamlit
        env:
          PYTHONPATH: ../api:.
        run: |
          python -c "import streamlit"
          python -c "import app.main"
          python -c "import components.settings; import views.pipeline_guide"

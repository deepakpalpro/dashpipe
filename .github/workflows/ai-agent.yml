name: ai-agent

on:
  push:
    branches: [main, master, 'feature/**']
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashflow-dev-ai-agent/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: dashflow-dev-ai-agent/api/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest -q

  ui-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashflow-dev-ai-agent/ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: dashflow-dev-ai-agent/ui/package-lock.json
      - run: npm ci
      - run: npm run build

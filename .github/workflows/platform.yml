name: platform

on:
  push:
    branches: [main, master, 'feature/**']
  pull_request:

jobs:
  maven:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Maven test
        run: ./dashflow-platform/mvnw -f dashflow-platform -pl dashflow-api -am test

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashflow-platform/dashflow-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: dashflow-platform/dashflow-ui/package-lock.json
      - run: npm ci
      - run: npm test -- --run
      - run: npm run lint

name: release-azure

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    environment: azure-production
    steps:
      - uses: actions/checkout@v4
      - name: Azure release placeholder
        run: |
          echo "Tag ${{ github.ref_name }} — run manually:"
          echo "  ./dashflow-ci_cd/scripts/azure/build-push-acr.sh <acrName> ${GITHUB_REF_NAME#v}"
          echo "  ./dashflow-ci_cd/scripts/azure/apply-aks.sh <acrName> ${GITHUB_REF_NAME#v}"

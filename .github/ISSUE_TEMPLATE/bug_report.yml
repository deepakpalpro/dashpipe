name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - dashpipe-platform (API / UI / pipelets)
        - dashpipe-ci_cd (scripts / k8s / Azure)
        - dashpipe-dev-ai-agent (AI / MCP)
        - dashpipe-tools (Prometheus / Grafana / ELK)
        - dashpipe-demo (Petstore / LocalStack)
        - other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
      placeholder: When I run X, I expected Y but got Z
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ./dashpipe-ci_cd/scripts/localdev.sh start
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: API logs, kubectl output, browser console, etc.

  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: e.g. v0.1.0 or abc1234

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS: macOS 14
        Docker: 24.x
        Java: 21
        K8s: Rancher Desktop

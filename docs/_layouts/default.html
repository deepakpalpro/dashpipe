<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  {%- assign parts = page.url | split: '/' -%}
  {%- assign asset_depth = parts.size | minus: 2 -%}
  {%- capture asset_root -%}
  {%- for i in (1..asset_depth) -%}../{%- endfor -%}
  {%- endcapture -%}
  <link rel="icon" href="{{ asset_root }}website/logo-mark.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ asset_root }}website/css/docs.css">
</head>
<body>
  <header class="docs-header">
    <div class="docs-header-inner">
      <a class="docs-brand" href="{{ asset_root }}index.html">
        <img src="{{ asset_root }}website/logo-mark.svg" alt="" width="24" height="24">
        <span>Dashpipe</span>
      </a>
      <a class="docs-home-link" href="{{ asset_root }}docs/README.html">All docs</a>
    </div>
  </header>
  <main class="docs-main">
    <article class="docs-article">
      {{ content }}
    </article>
  </main>
</body>
</html>

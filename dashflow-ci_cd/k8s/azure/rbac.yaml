apiVersion: v1
kind: ServiceAccount
metadata:
  name: dashflow-api
  namespace: dashflow
---
# API creates tenant-* namespaces and Jobs for pipelet stages.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dashflow-api-pipelet-jobs
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dashflow-api-pipelet-jobs
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dashflow-api-pipelet-jobs
subjects:
  - kind: ServiceAccount
    name: dashflow-api
    namespace: dashflow

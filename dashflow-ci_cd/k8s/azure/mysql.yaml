apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init
  namespace: dashflow
data:
  01-petstore-db.sql: |
    CREATE DATABASE IF NOT EXISTS petstore;
    GRANT ALL PRIVILEGES ON petstore.* TO 'pipeline'@'%';
    FLUSH PRIVILEGES;
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: dashflow
  labels:
    app: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.4
          ports:
            - containerPort: 3306
              name: mysql
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dashflow-secrets
                  key: mysql-root-password
            - name: MYSQL_DATABASE
              value: pipeline
            - name: MYSQL_USER
              value: pipeline
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dashflow-secrets
                  key: mysql-password
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          readinessProbe:
            exec:
              command:
                [
                  "sh",
                  "-c",
                  "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\"",
                ]
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1Gi
      volumes:
        - name: data
          emptyDir: {}
        - name: init
          configMap:
            name: mysql-init
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: dashflow
spec:
  selector:
    app: mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306

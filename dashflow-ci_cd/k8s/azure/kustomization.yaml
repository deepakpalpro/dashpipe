apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: dashflow
resources:
  - namespace.yaml
  - rbac.yaml
  - secret.example.yaml
  - mysql.yaml
  - rabbitmq.yaml
  - api.yaml
  - ui.yaml
  - ../../../dashflow-demo/k8s/petstore.yaml
  - ../../../dashflow-demo/k8s/petstore-inventory.yaml
  - ../../../dashflow-tools/k8s/prometheus.yaml
  - ../../../dashflow-tools/k8s/grafana.yaml
images:
  - name: dashflow/api
    newName: dashflow/api
    newTag: latest
  - name: dashflow/ui
    newName: dashflow/ui
    newTag: latest
  - name: dashflow/petstore
    newName: dashflow/petstore
    newTag: latest
  - name: dashflow/petstore-inventory
    newName: dashflow/petstore-inventory
    newTag: latest
  - name: mysql
    newName: mysql
    newTag: "8.4"
  - name: rabbitmq
    newName: rabbitmq
    newTag: "3.13-management"
  - name: prom/prometheus
    newName: prom/prometheus
    newTag: v2.55.1
  - name: grafana/grafana
    newName: grafana/grafana
    newTag: "11.3.1"

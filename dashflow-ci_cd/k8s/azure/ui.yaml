apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashflow-ui
  namespace: dashflow
  labels:
    app: dashflow-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashflow-ui
  template:
    metadata:
      labels:
        app: dashflow-ui
    spec:
      containers:
        - name: ui
          image: dashflow/ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: dashflow-ui
  namespace: dashflow
spec:
  selector:
    app: dashflow-ui
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: LoadBalancer

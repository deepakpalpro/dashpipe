# Azure assembly pin
name: azure
description: First cloud assembly for Dashflow (platform only)
platform:
  broker: servicebus          # Wave B; Wave A demo uses in-cluster RabbitMQ
  runtime: kubernetes              # AKS
  database: mysql             # Azure MySQL Flexible (Wave B) or in-cluster (Wave A)
  observability: azure-monitor
infra:
  iac: deploy/azure/main.bicep
  k8s_wave_a: deploy/k8s/azure
  scripts:
    - scripts/azure/build-push-acr.sh
    - scripts/azure/apply-aks.sh
  services:
    - aks
    - mysql-flexible
    - service-bus
    - acr
    - log-analytics
out_of_scope:
  - azure-blob-connectors
  - event-hubs
  - pipelet-cloud-providers

# dashpipe-suite root orchestrator
# Usage: docker compose up -d
# Optional: docker compose --profile petstore --profile metrics --profile elk up -d
#
# Container/volume prefix is df-* so this stack can coexist with pipeline-platform (pp-*).

name: dashpipe-suite

include:
  - path: dashpipe-ci_cd/docker-compose.platform.yml
  - path: dashpipe-demo/docker-compose.demo.yml
  - path: dashpipe-tools/docker-compose.tools.yml

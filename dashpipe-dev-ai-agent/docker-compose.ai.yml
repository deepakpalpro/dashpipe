name: dashpipe-ai

services:
  ollama:
    profiles: ["bundled-ollama"]
    image: ollama/ollama:latest
    container_name: df-ai-ollama
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    volumes:
      - df-ai-ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: df-ai-api
    ports:
      - "${API_HOST_PORT:-8090}:8090"
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      CHAT_MODEL: ${CHAT_MODEL:-llama3.2:1b}
      CODE_MODEL: ${CODE_MODEL:-qwen2.5-coder:1.5b}
      READ_TIMEOUT_S: "180"
      DASHPIPE_API_URL: ${DASHPIPE_API_URL:-http://host.docker.internal:8080}
      DASHPIPE_TENANT_ID: ${DASHPIPE_TENANT_ID:-T001}
    depends_on:
      ollama:
        condition: service_healthy
        required: false
    extra_hosts:
      - "host.docker.internal:host-gateway"

  streamlit:
    build:
      context: .
      dockerfile: streamlit/Dockerfile
    container_name: df-ai-streamlit
    ports:
      - "${STREAMLIT_HOST_PORT:-8501}:8501"
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      CHAT_MODEL: ${CHAT_MODEL:-llama3.2:1b}
      CODE_MODEL: ${CODE_MODEL:-qwen2.5-coder:1.5b}
      READ_TIMEOUT_S: "180"
      DASHPIPE_API_URL: ${DASHPIPE_API_URL:-http://host.docker.internal:8080}
      DASHPIPE_TENANT_ID: ${DASHPIPE_TENANT_ID:-T001}
    depends_on:
      api:
        condition: service_started
      ollama:
        condition: service_healthy
        required: false
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  df-ai-ollama-data:

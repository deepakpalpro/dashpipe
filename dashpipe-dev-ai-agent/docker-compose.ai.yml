name: dashpipe-ai

services:
  ollama:
    image: ollama/ollama:latest
    container_name: df-ai-ollama
    ports:
      - "11434:11434"
    volumes:
      - df-ai-ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 20s

  api:
    build:
      context: ./api
    container_name: df-ai-api
    ports:
      - "8090:8090"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      CHAT_MODEL: llama3.2:1b
      CODE_MODEL: qwen2.5-coder:1.5b
      READ_TIMEOUT_S: "180"
    depends_on:
      ollama:
        condition: service_healthy

  ui:
    build:
      context: ./ui
      args:
        VITE_API_URL: http://localhost:8090
    container_name: df-ai-ui
    ports:
      - "5174:80"
    depends_on:
      - api

volumes:
  df-ai-ollama-data:

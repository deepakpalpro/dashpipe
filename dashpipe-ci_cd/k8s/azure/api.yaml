apiVersion: v1
kind: ConfigMap
metadata:
  name: dashpipe-api-config
  namespace: dashpipe
data:
  # Empty Wave A: in-cluster MySQL + RabbitMQ. Profile k8s only (no local demo seed).
  SPRING_PROFILES_ACTIVE: "k8s"
  SPRING_FLYWAY_LOCATIONS: "classpath:db/migration"
  SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/pipeline?allowPublicKeyRetrieval=true&useSSL=false"
  SPRING_DATASOURCE_USERNAME: "pipeline"
  SPRING_RABBITMQ_HOST: "rabbitmq"
  SPRING_RABBITMQ_PORT: "5672"
  SPRING_RABBITMQ_USERNAME: "pipeline"
  PIPELINE_ORCHESTRATION_STUB_STAGE_WORKER: "false"
  PIPELINE_ORCHESTRATION_AMQP_URL: "amqp://pipeline:pipeline@rabbitmq.dashpipe.svc.cluster.local:5672/"
  PIPELINE_K8S_ENABLED: "true"
  PIPELINE_K8S_CREATE_NAMESPACE: "true"
  PIPELINE_K8S_IMAGE_PULL_POLICY: "Always"
  # Overridden by apply script / kustomize replacements with real ACR host + tag.
  PIPELINE_K8S_DEFAULT_IMAGE_PATTERN: "dashpipe/{pipeletId}:latest"
  PIPELINE_INGRESS_BASE_URL: "http://dashpipe-ui"
  PIPELINE_OBSERVABILITY_GRAFANA_BASE_URL: "http://grafana:3000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashpipe-api
  namespace: dashpipe
  labels:
    app: dashpipe-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashpipe-api
  template:
    metadata:
      labels:
        app: dashpipe-api
    spec:
      serviceAccountName: dashpipe-api
      containers:
        - name: api
          image: dashpipe/api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: dashpipe-api-config
          env:
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dashpipe-secrets
                  key: mysql-password
            - name: SPRING_RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dashpipe-secrets
                  key: rabbitmq-password
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 40
            periodSeconds: 10
            failureThreshold: 18
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1536Mi
---
apiVersion: v1
kind: Service
metadata:
  name: dashpipe-api
  namespace: dashpipe
spec:
  selector:
    app: dashpipe-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080

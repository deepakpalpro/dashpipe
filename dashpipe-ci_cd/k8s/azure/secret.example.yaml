# Copy to secret.yaml and fill values, or create via:
#   kubectl -n dashpipe create secret generic dashpipe-secrets \
#     --from-literal=mysql-root-password=... \
#     --from-literal=mysql-password=... \
#     --from-literal=rabbitmq-password=... \
#     --from-literal=grafana-admin-password=...
apiVersion: v1
kind: Secret
metadata:
  name: dashpipe-secrets
  namespace: dashpipe
type: Opaque
stringData:
  mysql-root-password: "root"
  mysql-password: "pipeline"
  rabbitmq-password: "pipeline"
  grafana-admin-password: "admin"

# Observability: Prometheus + Grafana (metrics) and ELK (elk profile)
services:
  elasticsearch:
    profiles: ["elk"]
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: df-elasticsearch
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - df-es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s

  kibana:
    profiles: ["elk"]
    image: docker.elastic.co/kibana/kibana:8.15.3
    container_name: df-kibana
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy

  logstash:
    profiles: ["elk"]
    image: docker.elastic.co/logstash/logstash:8.15.3
    container_name: df-logstash
    ports:
      - "5044:5044"
    volumes:
      - ./elk/logstash/pipeline:/usr/share/logstash/pipeline:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      XPACK_MONITORING_ENABLED: "false"

  prometheus:
    profiles: ["metrics"]
    image: prom/prometheus:v2.55.1
    container_name: df-prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - df-prometheus-data:/prometheus
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:9090/-/healthy >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  grafana:
    profiles: ["metrics"]
    image: grafana/grafana:11.3.1
    container_name: df-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - df-grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:3000/api/health >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  df-es-data:
  df-prometheus-data:
  df-grafana-data:

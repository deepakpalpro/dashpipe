apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: dashpipe
data:
  datasource.yml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: dashpipe
data:
  dashboards.yml: |
    apiVersion: 1

    providers:
      - name: dashpipe
        orgId: 1
        folder: Dashpipe
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: dashpipe
data:
  pipeline-overview.json: |
    {
      "title": "Pipeline Overview (local)",
      "uid": "pipeline-overview-local",
      "tags": ["dashpipe", "local"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "templating": {
        "list": [
          {
            "name": "tenant_id",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": "label_values(pipeline_completeness_ratio, tenant_id)",
            "includeAll": true,
            "multi": false,
            "current": { "text": "All", "value": "$__all" },
            "refresh": 2
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Completeness ratio",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.8 },
                  { "color": "green", "value": 0.95 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "pipeline_completeness_ratio{tenant_id=~\"$tenant_id\"}",
              "legendFormat": "{{pipeline_id}}"
            }
          ]
        },
        {
          "id": 2,
          "title": "Records in / out",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 16, "x": 8, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum by (pipeline_id) (rate(pipelet_records_in_total{tenant_id=~\"$tenant_id\"}[1m]))",
              "legendFormat": "in {{pipeline_id}}"
            },
            {
              "expr": "sum by (pipeline_id) (rate(pipelet_records_out_total{tenant_id=~\"$tenant_id\"}[1m]))",
              "legendFormat": "out {{pipeline_id}}"
            }
          ]
        },
        {
          "id": 3,
          "title": "Heartbeat age (seconds)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "time() - pipelet_heartbeat_timestamp{tenant_id=~\"$tenant_id\"}",
              "legendFormat": "{{pipelet_id}}"
            }
          ]
        },
        {
          "id": 4,
          "title": "Pipelet errors",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum by (error_type) (rate(pipelet_errors_total{tenant_id=~\"$tenant_id\"}[1m]))",
              "legendFormat": "{{error_type}}"
            }
          ]
        },
        {
          "id": 5,
          "title": "JVM memory used",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "jvm_memory_used_bytes{area=\"heap\"}",
              "legendFormat": "{{id}}"
            }
          ]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: dashpipe
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.3.1
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dashpipe-secrets
                  key: grafana-admin-password
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            - name: GF_PATHS_PROVISIONING
              value: /etc/grafana/provisioning
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards
              readOnly: true
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
              readOnly: true
            - name: data
              mountPath: /var/lib/grafana
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-provider
          configMap:
            name: grafana-dashboards-provider
        - name: dashboards
          configMap:
            name: grafana-dashboards
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: dashpipe
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000

apiVersion: apps/v1
kind: Deployment
metadata:
  name: petstore
  namespace: dashpipe
  labels:
    app: petstore
spec:
  replicas: 1
  selector:
    matchLabels:
      app: petstore
  template:
    metadata:
      labels:
        app: petstore
    spec:
      containers:
        - name: petstore
          image: dashpipe/petstore:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4010
              name: http
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "4010"
            - name: MYSQL_HOST
              value: mysql
            - name: MYSQL_PORT
              value: "3306"
            - name: MYSQL_USER
              value: pipeline
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dashpipe-secrets
                  key: mysql-password
            - name: MYSQL_DATABASE
              value: petstore
            - name: MYSQL_ROOT_USER
              value: root
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dashpipe-secrets
                  key: mysql-root-password
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 18
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: petstore
  namespace: dashpipe
spec:
  selector:
    app: petstore
  ports:
    - name: http
      port: 4010
      targetPort: 4010
